name: 'Setup DeepaBMS'
description: 'Checkout, setup Node.js, cache npm, and install dependencies for DeepaBMS CI'

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      shell: bash
      run: npm ci
