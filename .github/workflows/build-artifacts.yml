name: Build Android APK and Windows Installer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Prebuild Android project
        run: npx expo prebuild --platform android

      - name: Build APK (Local Gradle)
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepa-bms-android-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  build-windows:
    name: Build Windows EXE Installer
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Build Web Bundle
        run: |
          npm ci
          npx expo export -p web --output-dir apps/windows/web

      - name: Install Windows App dependencies
        working-directory: apps/windows
        run: npm ci

      - name: Package Windows Executable
        working-directory: apps/windows
        run: npm run package

      - name: Upload Windows EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepa-bms-windows-installer
          path: apps/windows/dist/*.exe
