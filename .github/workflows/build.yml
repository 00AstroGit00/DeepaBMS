name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  lint-test:
    name: Lint & Test
    uses: ./.github/workflows/test.yml

  build-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: bash scripts/ci/version.sh

      - name: Resolve image name (lowercase for GHCR)
        run: echo "IMAGE_NAME=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/deepa-bms-backend" >> "$GITHUB_ENV"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile.prod
          platforms: linux/amd64
          push: true
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: |
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} \
            -o spdx-json > sbom.spdx.json
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} \
            -o cyclonedx-json > sbom.cyclonedx.json

      - name: Attach SBOM to image
        run: |
          cosign attach sbom --sbom sbom.spdx.json \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-sbom
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android project
        run: npx expo prebuild --platform android

      - name: Build APK (Local Gradle)
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepa-bms-android-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  build-windows:
    name: Build Windows EXE Installer
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache Electron Binaries
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('apps/windows/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Build Web Bundle
        run: |
          npm ci
          npx expo export -p web --output-dir apps/windows/web

      - name: Install Windows App dependencies
        working-directory: apps/windows
        run: npm ci

      - name: Package Windows Executable
        working-directory: apps/windows
        run: npm run package

      - name: Upload Windows EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepa-bms-windows-installer
          path: apps/windows/dist/*.exe

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-windows, build-backend]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: bash scripts/ci/version.sh

      - name: Generate changelog
        id: changelog
        run: |
          bash scripts/ci/changelog.sh > CHANGELOG.md
          {
            echo "body<<EOF"
            cat CHANGELOG.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: deepa-bms-android-apk
          path: artifacts/android

      - name: Download Windows Installer
        uses: actions/download-artifact@v4
        with:
          name: deepa-bms-windows-installer
          path: artifacts/windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/android/app-release.apk
            artifacts/windows/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
