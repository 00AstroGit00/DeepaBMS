name: Release Gates

# Executable verification gates for GA certification (F-3, F-4, F-6).
# Runs on ubuntu-latest where docker / helm / kubectl / k6 are available.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  IMAGE_TAG: deepa-bms-backend:gate

jobs:
  container-smoke:
    name: F-3 Container Smoke (SQLite volume, health)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t ${{ env.IMAGE_TAG }} -f apps/backend/Dockerfile.prod ./apps/backend

      - name: Run container with persisted SQLite volume
        run: |
          docker run -d --name backend -p 3000:3000 \
            -v sqlite-data:/app/data \
            -e SQLITE_DB_PATH=/app/data/deepa-bms.db \
            -e NODE_ENV=production \
            -e JWT_SECRET=smoke-test-secret \
            ${{ env.IMAGE_TAG }}

      - name: Wait for liveness probe
        run: |
          for i in $(seq 1 40); do
            if curl -fs http://localhost:3000/health/live; then
              echo "backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "health check failed"; docker logs backend; exit 1

      - name: Verify SQLite DB file is persisted on volume
        run: |
          docker exec backend test -s /app/data/deepa-bms.db \
            && echo "SQLite file present on /app/data" \
            || { echo "SQLite file MISSING"; docker logs backend; exit 1; }

      - name: Stop container
        if: always()
        run: docker rm -f backend

  helm-k8s-validate:
    name: F-4 Helm Lint & K8s Manifest Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Helm lint
        run: helm lint ./helm/deepa-bms

      - name: Helm template (production values)
        run: helm template deepa-bms ./helm/deepa-bms -f ./helm/deepa-bms/values.yaml > /tmp/helm-rendered.yaml

      - name: Kustomize build (base + overlays)
        run: |
          kubectl kustomize k8s/base > /tmp/k8s-base.yaml
          kubectl kustomize k8s/overlays/production > /tmp/k8s-prod.yaml
          kubectl kustomize k8s/overlays/staging > /tmp/k8s-staging.yaml

      - name: Validate manifests with kubeconform
        uses: yannh/kubeconform-action@v1
        with:
          files: /tmp/helm-rendered.yaml,/tmp/k8s-base.yaml,/tmp/k8s-prod.yaml,/tmp/k8s-staging.yaml
          strict: true
          summary: true

  perf-benchmark:
    name: F-6 Performance Benchmark (k6 smoke load)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t ${{ env.IMAGE_TAG }} -f apps/backend/Dockerfile.prod ./apps/backend

      - name: Run backend
        run: |
          docker run -d --name backend -p 3000:3000 \
            -v sqlite-data:/app/data \
            -e SQLITE_DB_PATH=/app/data/deepa-bms.db \
            -e NODE_ENV=production \
            -e JWT_SECRET=perf-test-secret \
            ${{ env.IMAGE_TAG }}

      - name: Wait for health
        run: |
          for i in $(seq 1 40); do
            curl -fs http://localhost:3000/health/live && break
            sleep 2
          done

      - name: Run k6 smoke load test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/load/smoke.js

      - name: Stop container
        if: always()
        run: docker rm -f backend
