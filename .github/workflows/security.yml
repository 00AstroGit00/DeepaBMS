name: Security

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup DeepaBMS
        uses: ./.github/actions/setup

      # Gate on CRITICAL only. All HIGH advisories are build/install-time
      # (expo / sqlite3 native addon) and are accepted pending a controlled,
      # breaking upgrade tracked in docs/security/SECURITY_EXCEPTIONS.md and
      # DEPENDENCY_REMEDIATION.md. Blocking on HIGH here would block every
      # release while the upgrade is deferred; the advisories remain fully
      # visible in the audit JSON artifact and Snyk scan below.
      - name: 'npm audit (gate critical)'
        run: npm audit --audit-level=critical

      - name: npm audit (full report, non-blocking)
        continue-on-error: true
        run: npm audit --json > npm-audit-full.json || true

      - name: Snyk scan (optional)
        continue-on-error: true
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # NOTE: CodeQL is provided by GitHub's default code scanning workflow
  # (github-code-scanning/codeql, enabled via the Security tab). Running a
  # second CodeQL analysis here caused duplicate-SARIF upload conflicts
  # ("could not process the submitted SARIF file"). The default workflow
  # already covers javascript-typescript (plus python and actions), so it
  # is the authoritative CodeQL gate for this repository.

  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Retry the build: sqlite3 prebuilt-binary download occasionally hits
      # transient ECONNRESET during `npm ci` (native addon fetch). The Build
      # workflow uses the same Dockerfile; a retry resolves the flake without
      # changing image contents.
      - name: Build backend image
        run: |
          for i in 1 2 3; do
            if docker build -t deepa-bms-backend:scan -f apps/backend/Dockerfile.prod ./apps/backend; then
              break
            fi
            echo "::warning::docker build attempt $i failed (likely transient npm/sqlite3 download error), retrying..."
            sleep 15
          done

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: deepa-bms-backend:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
