name: Security

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Setup DeepaBMS
        uses: ./.github/actions/setup

      # Gate on CRITICAL only. All HIGH advisories are build/install-time
      # (expo / sqlite3 native addon) and are accepted pending a controlled,
      # breaking upgrade tracked in docs/security/SECURITY_EXCEPTIONS.md and
      # DEPENDENCY_REMEDIATION.md. Blocking on HIGH here would block every
      # release while the upgrade is deferred; the advisories remain fully
      # visible in the audit JSON artifact and Snyk scan below.
      - name: 'npm audit (gate critical)'
        run: npm audit --audit-level=critical

      - name: npm audit (full report, non-blocking)
        continue-on-error: true
        run: npm audit --json > npm-audit-full.json || true

      - name: Snyk scan (optional)
        continue-on-error: true
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t deepa-bms-backend:scan -f apps/backend/Dockerfile.prod ./apps/backend

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: deepa-bms-backend:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
