stages:
  - test
  - security
  - build
  - deploy
  - release

variables:
  REGISTRY: "registry.gitlab.com"
  IMAGE_NAME: "$CI_REGISTRY/deepa-bms/backend"
  NODE_VERSION: "20"
  POSTGRES_USER: "deepa"
  POSTGRES_PASSWORD: "deepa"
  POSTGRES_DB: "deepa_bms_test"
  DATABASE_URL: "postgres://deepa:deepa@postgres:5432/deepa_bms_test"
  NODE_ENV: "test"

default:
  image: node:20
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/

# ---- Test stage ----
lint:
  stage: test
  script:
    - npm ci
    - npm run lint

typecheck:
  stage: test
  script:
    - npm ci
    - npm run ts:check

unit:
  stage: test
  services:
    - postgres:15
  script:
    - npm ci
    - npm test -- --coverage
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/

integration:
  stage: test
  services:
    - postgres:15
  script:
    - npm ci
    - cd apps/backend && npm ci && npm test
  needs: []

# ---- Security stage ----
dependency-scan:
  stage: security
  script:
    - npm ci
    - npm audit --audit-level=high
  allow_failure: true

container-scan:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  services:
    - docker:dind
  script:
    - docker build -t deepa-bms-backend:scan -f apps/backend/Dockerfile ./apps/backend
    - trivy image --exit-code 0 --severity HIGH,CRITICAL deepa-bms-backend:scan
  allow_failure: true

sast:
  stage: security
  include:
    - template: Security/SAST.gitlab-ci.yml

# ---- Build stage ----
docker-build:
  stage: build
  image: docker:24
  services:
    - docker:dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - apk add --no-cache bash
    - chmod +x scripts/ci/version.sh
    - source scripts/ci/version.sh --export
    - docker build -t "$IMAGE_NAME:$VERSION" -f apps/backend/Dockerfile ./apps/backend
    - docker push "$IMAGE_NAME:$VERSION"
    - docker tag "$IMAGE_NAME:$VERSION" "$IMAGE_NAME:latest"
    - docker push "$IMAGE_NAME:latest"
    # SBOM via syft
    - |
      curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      syft "$IMAGE_NAME:$VERSION" -o spdx-json > sbom.spdx.json
    # Cosign sign
    - |
      curl -sSfL https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o /usr/local/bin/cosign
      chmod +x /usr/local/bin/cosign
      cosign sign --yes "$IMAGE_NAME:$VERSION"
  artifacts:
    paths:
      - sbom.spdx.json
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_TAG =~ /^v/'

# ---- Deploy stage ----
deploy-staging:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl --kubeconfig "$KUBE_CONFIG_STAGING" apply -f docker/ -n deepa-bms-staging
  environment:
    name: staging
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy-production:
  stage: deploy
  image: alpine/helm:latest
  script:
    - helm upgrade --install deepa-bms ./docker --kubeconfig "$KUBE_CONFIG_PRODUCTION" --namespace deepa-bms-prod -f docker/values-prod.yaml
  environment:
    name: production
  when: manual
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

# ---- Release stage ----
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - apk add --no-cache bash git
    - chmod +x scripts/ci/changelog.sh
    - bash scripts/ci/changelog.sh > CHANGELOG.md
    - |
      release-cli create --name "Release $CI_COMMIT_TAG" \
        --tag-name "$CI_COMMIT_TAG" \
        --description "$(cat CHANGELOG.md)"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
