# =============================================================================
# DeepaBMS — Production Docker Compose
# =============================================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --wait
#   docker compose -f docker-compose.prod.yml --profile monitoring up -d
#
# Architecture: SQLite (single-process, WAL mode).
# Data is persisted via the bms-sqlite named volume at /app/data/deepa-bms.db.
# =============================================================================

version: "3.8"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  bms-net:
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  bms-sqlite:
  prometheus-data:
  grafana-data:

# ── Services ─────────────────────────────────────────────────────────────────
services:

  # ── Backend API (SQLite) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.prod
      args:
        BUILD_VERSION: ${BUILD_VERSION:-latest}
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
    image: deepa-bms-backend:${BUILD_VERSION:-latest}
    container_name: deepa-bms-backend
    restart: always
    logging: *default-logging
    env_file:
      - .env.production
    environment:
      SQLITE_DB_PATH: /app/data/deepa-bms.db
    networks:
      - bms-net
    volumes:
      - bms-sqlite:/app/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  web:
    image: nginx:stable-alpine
    container_name: deepa-bms-web
    restart: always
    logging: *default-logging
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./apps/web/dist:/usr/share/nginx/html:ro
    networks:
      - bms-net
    depends_on:
      - backend

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: deepa-bms-prometheus
    restart: always
    logging: *default-logging
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - bms-net
    profiles:
      - monitoring

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: deepa-bms-grafana
    restart: always
    logging: *default-logging
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - bms-net
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # ── Alertmanager ────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: deepa-bms-alertmanager
    restart: always
    logging: *default-logging
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - bms-net
    profiles:
      - monitoring
