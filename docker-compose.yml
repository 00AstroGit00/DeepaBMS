version: '3.8'

services:
  # 1. Relational database storage (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: deepa-bms-postgres
    restart: always
    environment:
      POSTGRES_DB: deepa_bms
      POSTGRES_USER: deepa_admin
      POSTGRES_PASSWORD: secret_db_password_101
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - bms-net

  # 2. Express API Backend
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: deepa-bms-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: deepa-bms-secret-key-101
      DATABASE_URL: postgres://deepa_admin:secret_db_password_101@postgres:5432/deepa_bms
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - bms-net

  # 3. Static Nginx Web Router (Web Client app delivery)
  web:
    image: nginx:stable-alpine
    container_name: deepa-bms-web-client
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./apps/web/dist:/usr/share/nginx/html
    networks:
      - bms-net

  # 4. Cloudflare Tunnel (Enables secure sync from any network/internet without port forwarding)
  # OPTION A: Persistent Tunnel (Recommended for production, requires a Cloudflare Account & token)
  # To use: create a tunnel in Cloudflare Dashboard, get the token, and add it to your .env file
  tunnel-prod:
    image: cloudflare/cloudflared:latest
    container_name: deepa-bms-tunnel-prod
    restart: always
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    depends_on:
      - backend
    networks:
      - bms-net
    profiles:
      - production

  # OPTION B: Quick Tunnel (Recommended for instant zero-config testing)
  # To use: run `docker compose --profile demo up` and check the logs for the temporary public HTTPS URL
  tunnel-demo:
    image: cloudflare/cloudflared:latest
    container_name: deepa-bms-tunnel-demo
    restart: always
    command: tunnel --no-autoupdate --url http://backend:3000
    depends_on:
      - backend
    networks:
      - bms-net
    profiles:
      - demo

volumes:
  pgdata:

networks:
  bms-net:
    driver: bridge
