# =============================================================================
# DeepaBMS — Nginx Production Configuration
# =============================================================================
#
# Reverse proxy for the backend API, static file server for the web client.
#
# To enable SSL with cert-manager / Let's Encrypt, uncomment the SSL server
# block below and run:
#   sudo certbot --nginx -d your-domain.com
# =============================================================================

# ── Rate Limiting Zones ──────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# ── Upstream ─────────────────────────────────────────────────────────────────
upstream backend_upstream {
    server backend:3000;
    keepalive 64;
}

# ── HTTP Server (redirect to HTTPS or serve directly) ────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/x-javascript
        text/css
        text/javascript
        text/plain
        text/xml
        application/xml
        image/svg+xml;

    # ── Static Files ───────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600, immutable";
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Health Check Passthrough ──────────────────────────────────────────────
    location /health/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
        limit_req zone=api_limit burst=10 nodelay;
    }

    # ── API Reverse Proxy ─────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;

        # Do not buffer large JSON payloads
        proxy_buffering off;
    }

    # ── Deny Access to Hidden Files ────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Deny Access to Sensitive Paths ─────────────────────────────────────────
    location ~* (node_modules|\.git|\.env|\.sql) {
        deny all;
        access_log off;
        log_not_found off;
    }
}

