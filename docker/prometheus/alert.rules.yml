# =============================================================================
# DeepaBMS — Prometheus Alert Rules
# =============================================================================
# All metric selectors reference series actually exposed by the backend at
# /api/platform/metrics (SQLite + process metrics). PostgreSQL/Redis selectors
# were removed (OBS-02) because the backend does not use those systems.
groups:
  - name: deepa-bms-alerts
    rules:
      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, sum(rate(deepa_http_request_duration_seconds_bucket[5m])) by (le)) > 5
        for: 5m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "High request latency on backend"
          description: "95th percentile request latency is above 5s for 5 minutes (current: {{ $value }}s)."

      - alert: HighErrorRate
        expr: sum(rate(deepa_http_requests_total{status=~"5.."}[5m])) / sum(rate(deepa_http_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "High HTTP error rate on backend"
          description: "HTTP 5xx error rate is above 5% for 5 minutes (current: {{ $value | humanizePercentage }})."

      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          service: "{{ $labels.service }}"
        annotations:
          summary: "Instance {{ $labels.instance }} down"
          description: "{{ $labels.job }} instance {{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighMemoryUsage
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 20
        for: 5m
        labels:
          severity: warning
          service: node
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Available memory is below 20% for 5 minutes (current free: {{ $value | humanizePercentage }})."

      - alert: HighCPUUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          service: node
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 80% for 5 minutes (current: {{ $value }}%)."

      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
          service: node
        annotations:
          summary: "Low disk space on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "Free disk space is below 10% for 5 minutes (current free: {{ $value | humanizePercentage }})."

      - alert: LedgerPostFailures
        expr: deepa_ledger_post_failures > 0
        for: 5m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Ledger auto-posting failures detected"
          description: "{{ $value }} operational transactions failed to post to the general ledger and are queued for retry."

      - alert: WorkflowSchedulerStalled
        expr: increase(deepa_workflow_jobs_processed[1h]) == 0 and time() - process_start_time_seconds > 600
        for: 30m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "Workflow scheduler appears stalled"
          description: "No workflow jobs processed in the last hour despite the process running >10m."
