# =============================================================================
# DeepaBMS — SLO Recording Rules & Burn-Rate Alerts
# =============================================================================
# All selectors reference series actually exposed by the backend at
# /api/platform/metrics. PostgreSQL / backup-timestamp / anomaly selectors
# from the original config were removed (OBS-02) because those series do not
# exist (the backend uses SQLite, not PostgreSQL, and does not publish backup
# or anomaly gauges).
groups:
  # --------------------------------------------------------------------------
  # API Availability 99.9%  (successful = non-5xx responses)
  # --------------------------------------------------------------------------
  - name: slo-api-availability
    rules:
      - record: slo:api_availability:ratio_rate5m
        expr: |
          sum(rate(deepa_http_requests_total{status!~"5.."}[5m]))
            / sum(rate(deepa_http_requests_total[5m]))
      - record: slo:api_availability:ratio_rate30m
        expr: |
          sum(rate(deepa_http_requests_total{status!~"5.."}[30m]))
            / sum(rate(deepa_http_requests_total[30m]))
      - record: slo:api_availability:error_burn_rate_1h
        expr: |
          (1 - 0.999) * (1 - slo:api_availability:ratio_rate5m)
      - record: slo:api_availability:error_burn_rate_6h
        expr: |
          (1 - 0.999) * (1 - slo:api_availability:ratio_rate30m)

  # --------------------------------------------------------------------------
  # API Latency 99% of requests < 1s
  # --------------------------------------------------------------------------
  - name: slo-api-latency
    rules:
      - record: slo:api_latency:ratio_rate5m
        expr: |
          1 - (sum(rate(deepa_http_request_duration_seconds_bucket{le="1"}[5m]))
            / sum(rate(deepa_http_request_duration_seconds_count[5m])))
      - record: slo:api_latency:ratio_rate30m
        expr: |
          1 - (sum(rate(deepa_http_request_duration_seconds_bucket{le="1"}[30m]))
            / sum(rate(deepa_http_request_duration_seconds_count[30m])))
      - record: slo:api_latency:error_burn_rate_1h
        expr: |
          (1 - 0.99) * slo:api_latency:ratio_rate5m
      - record: slo:api_latency:error_burn_rate_6h
        expr: |
          (1 - 0.99) * slo:api_latency:ratio_rate30m

  # --------------------------------------------------------------------------
  # SQLite / Ledger Integrity SLO 99.99% (no unresolved post failures)
  # --------------------------------------------------------------------------
  - name: slo-ledger-integrity
    rules:
      - record: slo:ledger_integrity:ratio_rate5m
        expr: |
          1 - clamp_max(deepa_ledger_post_failures, 1)
      - record: slo:ledger_integrity:error_burn_rate_1h
        expr: |
          (1 - 0.9999) * (1 - slo:ledger_integrity:ratio_rate5m)

  # --------------------------------------------------------------------------
  # Burn-Rate Alerts (fast + slow windows)
  # --------------------------------------------------------------------------
  - name: slo-burn-rate-alerts
    rules:
      - alert: APIAvailabilityBurnRateFast
        expr: |
          slo:api_availability:error_burn_rate_1h > (14.4 * (1 - 0.999))
        for: 2m
        labels:
          severity: critical
          slo: api-availability
        annotations:
          summary: "API availability SLO burn rate critical (fast window)"
          description: "API availability is burning error budget ~14x faster than sustainable (99.9% SLO)."

      - alert: APIAvailabilityBurnRateSlow
        expr: |
          slo:api_availability:error_burn_rate_6h > (6 * (1 - 0.999))
        for: 15m
        labels:
          severity: warning
          slo: api-availability
        annotations:
          summary: "API availability SLO burn rate elevated (slow window)"
          description: "API availability error budget consumption is ~6x above target over 6h."

      - alert: APILatencyBurnRateFast
        expr: |
          slo:api_latency:error_burn_rate_1h > (14.4 * (1 - 0.99))
        for: 2m
        labels:
          severity: critical
          slo: api-latency
        annotations:
          summary: "API latency SLO burn rate critical (fast window)"
          description: "Requests slower than 1s are burning budget ~14x faster than sustainable (99% SLO)."

      - alert: APILatencyBurnRateSlow
        expr: |
          slo:api_latency:error_burn_rate_6h > (6 * (1 - 0.99))
        for: 15m
        labels:
          severity: warning
          slo: api-latency
        annotations:
          summary: "API latency SLO burn rate elevated (slow window)"
          description: "Latency budget consumption is ~6x above target over 6h."

      - alert: LedgerIntegrityBurnRateFast
        expr: |
          slo:ledger_integrity:error_burn_rate_1h > (14.4 * (1 - 0.9999))
        for: 2m
        labels:
          severity: critical
          slo: ledger-integrity
        annotations:
          summary: "Ledger integrity SLO burn rate critical (fast window)"
          description: "Unresolved ledger auto-post failures are burning budget ~14x faster than sustainable (99.99% SLO)."
