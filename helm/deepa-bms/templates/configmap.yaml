apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "deepa-bms.componentName" (dict "root" . "component" "config") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "deepa-bms.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  PORT: {{ .Values.config.port | quote }}
  SQLITE_DB_PATH: {{ .Values.config.sqliteDbPath | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  METRICS_ENABLED: {{ .Values.config.metricsEnabled | quote }}
  CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  TRUST_PROXY: {{ .Values.config.trustProxy | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "deepa-bms.componentName" (dict "root" . "component" "web-nginx") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "deepa-bms.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
data:
  nginx.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://{{ include "deepa-bms.componentName" (dict "root" . "component" "backend") }}:{{ .Values.service.backend.port }};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /healthz {
            access_log off;
            return 200 "ok\n";
        }
    }
