apiVersion: v1
kind: Secret
metadata:
  name: {{ include "deepa-bms.componentName" (dict "root" . "component" "secrets") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "deepa-bms.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  JWT_ISSUER: {{ .Values.secrets.jwtIssuer | quote }}
  JWT_AUDIENCE: {{ .Values.secrets.jwtAudience | quote }}
