apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: deepa-bms
  labels:
    app.kubernetes.io/part-of: deepa-bms
    app.kubernetes.io/component: backend
spec:
  # SQLite requires a single writer — exactly 1 replica.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: deepa-bms
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/deepabms/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: deepa-bms-config
            - secretRef:
                name: deepa-bms-secrets
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: sqlite-storage
              mountPath: /app/data
      volumes:
        - name: sqlite-storage
          persistentVolumeClaim:
            claimName: sqlite-pvc
