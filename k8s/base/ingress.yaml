apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deepa-bms-ingress
  namespace: deepa-bms
  labels:
    app.kubernetes.io/part-of: deepa-bms
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - bms.example.com
      secretName: deepa-bms-tls
  rules:
    - host: bms.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-service
                port:
                  number: 80
